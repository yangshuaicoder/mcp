server {
    listen 8083;
    server_name _;

    client_max_body_size 20m;

    access_log /data/logs/nginx/mcp_access.log;
    error_log  /data/logs/nginx/mcp_error.log;

    # API -> PHP backend
    location ~ ^/api/ {
        root /data/apps/mcp/current/backend/web;
        fastcgi_pass unix:/run/php-fpm/www.sock;
        fastcgi_param SCRIPT_FILENAME /data/apps/mcp/current/backend/web/index.php;
        include fastcgi_params;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_ROOT /data/apps/mcp/current/backend/web;
    }

    # Frontend SPA
    root /data/apps/web/mcp/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\. {
        deny all;
    }
}
